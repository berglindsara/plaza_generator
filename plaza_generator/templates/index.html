<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricer Plaza – Skjalaframleiðsla</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, Arial, sans-serif;
    background: #f0f2f5; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card {
    background: white; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 560px; overflow: hidden;
  }
  .card-header {
    background: linear-gradient(135deg, #0f3460 0%, #1a5276 100%);
    padding: 28px 32px 24px; display: flex; align-items: center; gap: 16px;
  }
  .logo {
    width: 48px; height: 48px; background: #e94560; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: white; flex-shrink: 0;
  }
  .card-header h1 { font-size: 18px; font-weight: 700; color: white; line-height: 1.3; }
  .card-header p  { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 3px; }
  .card-body { padding: 28px 32px 32px; }
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.7px; color: #6b7280; margin-bottom: 6px;
  }
  .field label span { color: #e94560; }
  .field input {
    width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px;
    font-size: 15px; color: #111; background: #fafafa;
    transition: border-color 0.2s, box-shadow 0.2s; font-family: inherit;
  }
  .field input:focus {
    outline: none; border-color: #0f3460; background: white;
    box-shadow: 0 0 0 3px rgba(15,52,96,0.08);
  }
  .field input::placeholder { color: #adb5bd; }
  .divider { border: none; border-top: 1px solid #f0f0f0; margin: 4px 0 20px; }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.7px;
    text-transform: uppercase; color: #0f3460; margin-bottom: 14px; margin-top: 4px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  #store-lines { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .store-line {
    display: grid; grid-template-columns: 1fr auto 80px auto;
    gap: 8px; align-items: center;
    background: #f8f9fb; border: 1.5px solid #e5e7eb;
    border-radius: 10px; padding: 10px 12px;
  }
  .tier-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .tier-pill {
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 36px; border: 2px solid #e5e7eb; border-radius: 8px;
    cursor: pointer; transition: all 0.15s; background: white;
    font-size: 13px; font-weight: 700; color: #374151; user-select: none;
  }
  .tier-pill:hover { border-color: #0f3460; background: #f0f4ff; }
  .tier-pill input[type="radio"] { display: none; }
  .tier-pill.selected { border-color: #0f3460; background: #0f3460; color: white; }
  .count-input {
    width: 70px; padding: 8px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px;
    font-size: 15px; font-weight: 600; text-align: center;
    color: #111; background: white; font-family: inherit;
  }
  .count-input:focus { outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.08); }
  .remove-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: #fee2e2; color: #dc2626; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .remove-btn:hover { background: #fecaca; }
  .remove-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .add-line-btn {
    width: 100%; padding: 10px; background: transparent;
    border: 2px dashed #d1d5db; border-radius: 10px;
    font-size: 13px; font-weight: 600; color: #6b7280;
    cursor: pointer; transition: all 0.15s; margin-bottom: 4px;
  }
  .add-line-btn:hover { border-color: #0f3460; color: #0f3460; background: #f0f4ff; }

  .btn-generate {
    width: 100%; padding: 13px; background: #0f3460; color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-generate:hover  { background: #0a2447; }
  .btn-generate:active { transform: scale(0.98); }
  .btn-generate:disabled { background: #9ca3af; cursor: not-allowed; }

  .result {
    display: none; margin-top: 20px; background: #f0fdf4;
    border: 1.5px solid #bbf7d0; border-radius: 10px; padding: 16px 18px;
  }
  .result.show { display: block; }
  .result h3 { font-size: 13px; font-weight: 700; color: #166534; margin-bottom: 10px; }
  .dl-group-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: #6b7280; margin-top: 10px; margin-bottom: 6px;
  }
  .dl-group-label:first-child { margin-top: 0; }
  .dl-group { display: flex; flex-direction: column; gap: 6px; }
  .dl-btn {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: white; border: 1.5px solid #d1fae5; border-radius: 8px;
    text-decoration: none; color: #166534; font-size: 13px; font-weight: 600;
    transition: background 0.15s, border-color 0.15s;
  }
  .dl-btn:hover { background: #dcfce7; border-color: #86efac; }
  .dl-btn.pdf { border-color: #fde68a; color: #92400e; }
  .dl-btn.pdf:hover { background: #fef9c3; border-color: #fbbf24; }
  .dl-icon { font-size: 18px; }
  .warn-msg {
    margin-top: 10px; background: #fffbeb; border: 1.5px solid #fde68a;
    border-radius: 8px; padding: 10px 14px; color: #92400e; font-size: 12px;
  }
  .error-msg {
    display: none; margin-top: 14px; background: #fef2f2;
    border: 1.5px solid #fecaca; border-radius: 8px; padding: 12px 14px;
    color: #b91c1c; font-size: 13px;
  }
  .error-msg.show { display: block; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }
  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">P</div>
    <div>
      <h1>Pricer Plaza<br>Skjalaframleiðsla</h1>
      <p>Útbýr SoW og Terms of Use sjálfkrafa</p>
    </div>
  </div>
  <div class="card-body">
    <form id="genForm" onsubmit="generate(event)">

      <div class="section-label">Viðskiptavinur</div>
      <div class="field">
        <label>Nafn viðskiptavinar <span>*</span></label>
        <input type="text" id="cust_name" placeholder="t.d. Elko" required autocomplete="off">
      </div>
      <div class="field">
        <label>Dagsetning <span>*</span></label>
        <input type="date" id="contract_date" required>
      </div>

      <hr class="divider">
      <div class="section-label">Tengiliður viðskiptavinar</div>
      <div class="field">
        <label>Nafn <span>*</span></label>
        <input type="text" id="cont_name" placeholder="Fullt nafn" required>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Netfang <span>*</span></label>
          <input type="email" id="cont_email" placeholder="nafn@fyrirtaeki.is" required>
        </div>
        <div class="field">
          <label>Símanúmer</label>
          <input type="tel" id="cont_phone" placeholder="+354...">
        </div>
      </div>

      <hr class="divider">
      <div class="section-label">Verslanir</div>
      <div id="store-lines"></div>
      <button type="button" class="add-line-btn" onclick="addStoreLine()">＋ Bæta við verslunarlínu</button>

      <button type="submit" class="btn-generate" id="genBtn">
        <div class="spinner"></div>
        <span class="btn-text">⚡ Búa til skjöl</span>
      </button>
    </form>

    <div class="error-msg" id="errMsg"></div>
    <div class="result" id="result">
      <h3 id="result-title">✅ Skjöl tilbúin!</h3>
      <div id="dl-links"></div>
    </div>
  </div>
</div>

<script>
const TIERS = ['1.5', '10', '20', '30'];
let lineCount = 0;

function addStoreLine(defaultTier = '1.5', defaultCount = '1') {
  lineCount++;
  const id = lineCount;
  const container = document.getElementById('store-lines');
  const div = document.createElement('div');
  div.className = 'store-line';
  div.id = `line-${id}`;
  const pillsHtml = TIERS.map(t => `
    <label class="tier-pill ${t === defaultTier ? 'selected' : ''}" onclick="selectTier(this, ${id})">
      <input type="radio" name="tier-${id}" value="Plaza Premium ${t}" ${t === defaultTier ? 'checked' : ''}>${t}
    </label>`).join('');
  div.innerHTML = `
    <div class="tier-pills">${pillsHtml}</div>
    <span style="font-size:12px;color:#9ca3af;white-space:nowrap;">fyrir</span>
    <input class="count-input" type="number" min="1" value="${defaultCount}" id="count-${id}">
    <button type="button" class="remove-btn" onclick="removeLine(${id})" title="Eyða">✕</button>`;
  container.appendChild(div);
  updateRemoveButtons();
}

function selectTier(el, id) {
  document.querySelectorAll(`#line-${id} .tier-pill`).forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input[type="radio"]').checked = true;
}

function removeLine(id) {
  const el = document.getElementById(`line-${id}`);
  if (el) el.remove();
  updateRemoveButtons();
}

function updateRemoveButtons() {
  const lines = document.querySelectorAll('.store-line');
  lines.forEach(l => {
    const btn = l.querySelector('.remove-btn');
    if (btn) btn.disabled = lines.length === 1;
  });
}

async function generate(e) {
  e.preventDefault();
  const btn   = document.getElementById('genBtn');
  const errEl = document.getElementById('errMsg');
  const resEl = document.getElementById('result');
  const dlEl  = document.getElementById('dl-links');

  btn.classList.add('loading'); btn.disabled = true;
  errEl.classList.remove('show'); resEl.classList.remove('show');

  const storeLines = [];
  document.querySelectorAll('.store-line').forEach(line => {
    const id    = line.id.replace('line-', '');
    const tier  = line.querySelector(`input[name="tier-${id}"]:checked`)?.value || 'Plaza Premium 1.5';
    const count = document.getElementById(`count-${id}`)?.value || '1';
    storeLines.push({ tier, count });
  });

  const rawDate = document.getElementById('contract_date').value;
  const [y, m, d] = rawDate.split('-');
  const formattedDate = `${d}.${m}.${y}`;

  const payload = {
    cust_name:     document.getElementById('cust_name').value.trim(),
    cont_name:     document.getElementById('cont_name').value.trim(),
    cont_email:    document.getElementById('cont_email').value.trim(),
    cont_phone:    document.getElementById('cont_phone').value.trim(),
    contract_date: formattedDate,
    store_lines:   storeLines,
  };

  try {
    const resp = await fetch('/generate', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Villa kom upp');

    document.getElementById('result-title').textContent = `✅ Skjöl tilbúin fyrir ${data.name}`;

    let html = `
      <div class="dl-group-label">📝 Word skjöl</div>
      <div class="dl-group">
        <a class="dl-btn" href="${data.sow_docx}" download>
          <span class="dl-icon">📄</span> ${data.name} – Pricer Plaza SoW.docx
        </a>
        <a class="dl-btn" href="${data.terms_docx}" download>
          <span class="dl-icon">📄</span> ${data.name} – Plaza Service Terms of Use.docx
        </a>
      </div>`;

    if (data.sow_pdf && data.terms_pdf) {
      html += `
        <div class="dl-group-label">🔒 PDF skjöl</div>
        <div class="dl-group">
          <a class="dl-btn pdf" href="${data.sow_pdf}" download>
            <span class="dl-icon">📕</span> ${data.name} – Pricer Plaza SoW.pdf
          </a>
          <a class="dl-btn pdf" href="${data.terms_pdf}" download>
            <span class="dl-icon">📕</span> ${data.name} – Plaza Service Terms of Use.pdf
          </a>
        </div>`;
    } else if (data.pdf_error) {
      html += `<div class="warn-msg">⚠️ PDF villa: ${data.pdf_error}</div>`;
    }

    dlEl.innerHTML = html;
    resEl.classList.add('show');
  } catch (err) {
    errEl.textContent = '❌ ' + err.message;
    errEl.classList.add('show');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

document.getElementById('contract_date').valueAsDate = new Date();
addStoreLine();
</script>
</body>
</html>
